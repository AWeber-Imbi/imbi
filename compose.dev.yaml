# Okteto dev environment (deployed by okteto.yml). Every Python service
# runs the same image built from Dockerfile.dev; they differ only in the
# console script each one runs. The production all-in-one image is
# compose.yaml.
services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    expose:
      - 8123
      - 9000
    environment:
      CLICKHOUSE_DB: imbi
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: password
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse/quiet.xml:/etc/clickhouse-server/config.d/quiet.xml

  imbi-api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: imbi-dev
    command: uv run imbi-api serve --dev --host 0.0.0.0
    working_dir: /workspace
    expose:
      - 8000
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLICKHOUSE_URL: clickhouse+http://default:password@clickhouse:8123/imbi
      IMBI_AUTH_JWT_SECRET: 592a9b33ccab80bb7b34016a324a7973ba7240a943662b88f113cad49237c6e8
      IMBI_AUTH_ENCRYPTION_KEY: ${IMBI_AUTH_ENCRYPTION_KEY:-gqHaS0afLt2R7gOhnjk1AvsjeQbzmT6gbRz-XQqduxY=}
      ENVIRONMENT: development
      IMBI_API_URL: https://imbi-gavinr.pse.testing.aweber.cloud/api
      IMBI_UI_URL: https://imbi-gavinr.pse.testing.aweber.cloud
      IMBI_INTERNAL_ASSISTANT_URL: http://imbi-assistant:8002
      IMBI_INTERNAL_GATEWAY_URL: http://imbi-gateway:8003
      IMBI_INTERNAL_MCP_URL: http://imbi-mcp:8001
      IMBI_INTERNAL_SLACKBOT_URL: http://imbi-slackbot:8004
      IMBI_EMAIL_SMTP_HOST: mailpit
      IMBI_EMAIL_SMTP_PORT: "1025"
      IMBI_EMAIL_SMTP_USE_TLS: "false"
      IMBI_RELOAD_DIRS: /workspace/src
      POSTGRES_URL: postgresql://postgres:secret@postgres:5432/imbi
      S3_ENDPOINT_URL: http://localstack:4566
      S3_ACCESS_KEY: test
      S3_SECRET_KEY: test
      VALKEY_URL: valkey://valkey:6379
      WATCHFILES_FORCE_POLLING: "true"
    depends_on:
      clickhouse:
        condition: service_healthy
      localstack:
        condition: service_healthy
      mailpit:
        condition: service_healthy
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  imbi-assistant:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: imbi-dev
    command: uv run imbi-assistant serve --dev --host 0.0.0.0
    working_dir: /workspace
    expose:
      - 8002
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      IMBI_AUTH_JWT_SECRET: 592a9b33ccab80bb7b34016a324a7973ba7240a943662b88f113cad49237c6e8
      IMBI_AUTH_ENCRYPTION_KEY: ${IMBI_AUTH_ENCRYPTION_KEY:-gqHaS0afLt2R7gOhnjk1AvsjeQbzmT6gbRz-XQqduxY=}
      IMBI_INTERNAL_API_URL: http://imbi-api:8000
      IMBI_ASSISTANT_URL: https://imbi-gavinr.pse.testing.aweber.cloud/assistant
      IMBI_UI_URL: https://imbi-gavinr.pse.testing.aweber.cloud
      IMBI_INTERNAL_UI_URL: http://imbi-ui:5173
      IMBI_ENVIRONMENT: development
      IMBI_RELOAD_DIRS: /workspace/src
      POSTGRES_URL: postgresql://postgres:secret@postgres:5432/imbi
      VALKEY_URL: valkey://valkey:6379
      WATCHFILES_FORCE_POLLING: "true"
    depends_on:
      imbi-api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  imbi-gateway:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: imbi-dev
    command: uv run imbi-gateway serve --dev --host 0.0.0.0
    working_dir: /workspace
    expose:
      - 8003
    environment:
      IMBI_AUTH_JWT_SECRET: 592a9b33ccab80bb7b34016a324a7973ba7240a943662b88f113cad49237c6e8
      IMBI_RELOAD_DIRS: /workspace/src
      POSTGRES_URL: postgresql://postgres:secret@postgres/imbi
      VALKEY_URL: valkey://valkey:6379
      WATCHFILES_FORCE_POLLING: "true"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  imbi-mcp:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: imbi-dev
    command: uv run imbi-mcp serve --host 0.0.0.0
    working_dir: /workspace
    expose:
      - 8001
    environment:
      IMBI_INTERNAL_API_URL: http://imbi-api:8000
      IMBI_AUTH_JWT_SECRET: 592a9b33ccab80bb7b34016a324a7973ba7240a943662b88f113cad49237c6e8
      IMBI_RELOAD_DIRS: /workspace/src
      IMBI_UI_URL: https://imbi-gavinr.pse.testing.aweber.cloud
      POSTGRES_URL: postgresql://postgres:secret@postgres:5432/imbi
      VALKEY_URL: valkey://valkey:6379
      WATCHFILES_FORCE_POLLING: "true"
    depends_on:
      imbi-api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  imbi-slackbot:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: imbi-dev
    command: uv run imbi-slackbot serve --dev --host 0.0.0.0
    working_dir: /workspace
    expose:
      - 8004
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      SLACK_APP_TOKEN: ${SLACK_APP_TOKEN:-}
      IMBI_AUTH_JWT_SECRET: 592a9b33ccab80bb7b34016a324a7973ba7240a943662b88f113cad49237c6e8
      IMBI_INTERNAL_API_URL: http://imbi-api:8000
      IMBI_UI_URL: https://imbi-gavinr.pse.testing.aweber.cloud
      IMBI_INTERNAL_UI_URL: http://imbi-ui:5173
      IMBI_ENVIRONMENT: development
      IMBI_RELOAD_DIRS: /workspace/src
      POSTGRES_URL: postgresql://postgres:secret@postgres:5432/imbi
      VALKEY_URL: valkey://valkey:6379
      WATCHFILES_FORCE_POLLING: "true"
    depends_on:
      imbi-api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  imbi-ui:
    build:
      context: ./apps/ui
      dockerfile: Dockerfile.dev
    command: npm run dev
    working_dir: /workspace/ui
    environment:
      VITE_API_URL: https://imbi-gavinr.pse.testing.aweber.cloud/api
    expose:
      - 5173

  localstack:
    image: localstack/localstack:latest
    expose:
      - 4566
    environment:
      LOCALSTACK_AUTH_TOKEN: ${LOCALSTACK_AUTH_TOKEN}
      SERVICES: s3
      DEBUG: "0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  mailpit:
    image: axllent/mailpit:v1.21.5
    expose:
      - 1025
    ports:
      - 1025
      - 8025
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: "1"
      MP_SMTP_AUTH_ALLOW_INSECURE: "1"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8025/api/v1/info"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: ghcr.io/aweber-imbi/postgres:latest
    expose:
      - 5432
    environment:
      POSTGRES_PASSWORD: secret
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      start_period: 30s
    volumes:
      - postgres-data:/var/lib/postgresql

  valkey:
    image: valkey/valkey:8-alpine
    expose:
      - 6379
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  clickhouse-data:
    driver_opts:
      size: 50Gi
      type: gp3
  postgres-data:
    driver_opts:
      size: 10Gi
      type: gp3
