services:
  imbi:
    build: .
    image: ghcr.io/aweber-imbi/imbi:local
    ports:
      - "2019"
      - "8080:8080"
    env_file: ./runtime/env-file
    depends_on:
      clickhouse:
        condition: service_healthy
      localstack:
        condition: service_healthy
      mailpit:
        condition: service_healthy
      postgres:
        condition: service_healthy

  imbi-api:
    scale: 0
    build:
      context: runtime
      dockerfile: Dockerfile.python
      args:
        SERVICE: "imbi-api"
        PORT: "8000"
    image: ghcr.io/aweber-imbi/python-uv:local
    ports:
      - 8000
    env_file: ./runtime/env-file
    volumes:
      - ./imbi-api/:/source/
      - ./runtime/uv-cache/:/root/.cache/uv/
      - ./runtime/wheels/:/mnt/wheels/
    working_dir: /source
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/status"]
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      clickhouse:
        condition: service_healthy
      localstack:
        condition: service_healthy
      mailpit:
        condition: service_healthy
      postgres:
        condition: service_healthy

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - 8123
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: password
      CLICKHOUSE_DB: imbi
    healthcheck:
      test: ["CMD-SHELL", "clickhouse client -q 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 10

  localstack:
    image: localstack/localstack:community-archive
    ports:
      - 4566
    environment:
      - SERVICES=s3
      - DEBUG=0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:v1.21.5
    ports:
      - 8025
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8025/api/v1/info"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: ghcr.io/aweber-imbi/postgres:latest
    ports:
      - 5432
    environment:
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: imbi
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
