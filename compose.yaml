services:
  imbi:
    build: .
    ports:
      - "8080:8080"
    environment:
      CLICKHOUSE_URL: http://default:password@clickhouse:8123/imbi
      POSTGRES_URL: postgresql://postgres:secret@postgres/imbi
      IMBI_AUTH_JWT_SECRET: dev-jwt-secret-change-in-production
      IMBI_AUTH_ENCRYPTION_KEY: dev-encryption-key-change-in-prod
      IMBI_ENVIRONMENT: testing
      IMBI_EMAIL_SMTP_HOST: mailpit
      IMBI_EMAIL_SMTP_PORT: 1025
      IMBI_EMAIL_SMTP_USE_TLS: false
      S3_ENDPOINT_URL: http://localstack:4566
      S3_ACCESS_KEY: test
      S3_SECRET_KEY: test
    depends_on:
      clickhouse:
        condition: service_healthy
      localstack:
        condition: service_healthy
      mailpit:
        condition: service_healthy
      postgres:
        condition: service_healthy

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: password
      CLICKHOUSE_DB: imbi
    healthcheck:
      test: ["CMD-SHELL", "clickhouse client -q 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 10

  localstack:
    image: localstack/localstack:community-archive
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEBUG=0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:v1.21.5
    ports:
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8025/api/v1/info"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: ghcr.io/aweber-imbi/postgres:latest
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: imbi
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
