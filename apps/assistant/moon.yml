# yaml-language-server: $schema=https://moonrepo.dev/schemas/project.json
layer: 'application'
stack: 'backend'
language: 'python'
tags:
  - 'python'

project:
  name: 'imbi-assistant'
  description: 'Imbi assistant service (:8002)'

dependsOn:
  - 'common'

# Inherits lint / format / typecheck / test from .moon/tasks/python.yml. Only
# the coverage module for this member is member-specific.
tasks:
  test:
    args:
      - '--cov=imbi.assistant'
      - '--cov-report=term-missing'
