[tool.pytest.ini_options]
addopts = ["--import-mode=importlib"]
consider_namespace_packages = true
# Put the workspace root on sys.path so the rootdir-anchored test-helper
# imports (e.g. `from apps.gateway.tests import helpers`) resolve under every
# launcher. `coverage run -m pytest` (root:coverage) adds cwd implicitly via
# `-m`; the bare `pytest` console script that per-member `moon run <m>:test`
# uses does not — this makes both behave identically.
pythonpath = ["."]
testpaths = ["apps/*/tests", "libraries/*/tests", "plugins/*/tests"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"

[tool.ruff]
line-length = 79
target-version = "py314"
extend-exclude = ["typings", "ui", "legacy"]

[tool.ruff.format]
quote-style = "single"

[tool.ruff.lint]
select = [
  "A",  # flake8-builtins
  "ANN",  # flake8-annotations
  "ARG",  # flake8-unused-arguments
  "ASYNC",  # flake8-async
  "B",  # flake8-bugbear
  "BLE",  # flake8-blind-except
  "C4",  # flake8-comprehensions
  "C90",  # mccabe
  "DTZ",  # flake8-datetimez
  "E",
  "W",  # pycodestyle
  "ERA",  # eradicate
  "F",  # pyflakes
  "FLY",  # flynt
  "FURB",  # refurb
  "G",  # flake8-logging-format
  "I",  # isort
  "LOG",  # flake8-logging
  "N",  # pep8-naming
  "PIE",  # flake8-pie
  "PL",  # pylint
  "PTH",  # flake8-use-pathlib
  "Q",  # flake8-quotes
  "RET",  # flake8-return
  "RSE",  # flake8-raise
  "RUF",  # ruff-specific
  "S",  # flake8-bandit
  "SIM",  # flake8-simplify
  "T10",  # flake8-debugger
  "T20",  # flake8-print
  "TC",  # flake8-type-checking
  "TRY",  # tryceratops
  "UP",  # pyupgrade
]
ignore = [
  "ANN401",  # typing.Any is acceptable in some signatures
  "N818",  # exception class names are not required to end in Error
  "S105",  # false positives on non-password strings
  "S106",  # false positive: hardcoded password in function argument
  "TRY003",  # message text in exception initializers is okay
  "TRY400",  # logging.exception is not always preferable
  "UP040",  # allow non-pep695-type-alias
  "UP047",  # type parameter syntax not yet adopted
]
flake8-quotes = { inline-quotes = "single" }

[tool.ruff.lint.isort]
known-first-party = ["imbi", "apps", "libraries", "plugins"]

[tool.ruff.lint.mccabe]
max-complexity = 15

[tool.ruff.lint.per-file-ignores]
# Suites not yet clean against the union rule set — burn down over time.
"libraries/common/**" = [
  "A",
  "ANN",
  "ARG",
  "ERA",
  "FLY",
  "LOG",
  "PIE",
  "PL",
  "PTH",
  "RET",
  "RSE",
  "SIM",
  "TC",
  "TRY"
]
"apps/api/**" = [
  "A",
  "ANN",
  "ARG",
  "ERA",
  "FLY",
  "LOG",
  "PIE",
  "PL",
  "PTH",
  "RET",
  "RSE",
  "SIM",
  "TC",
  "TRY"
]
"plugins/**" = [
  "A",
  "ANN",
  "ARG",
  "ASYNC109",
  "ERA",
  "FLY",
  "LOG",
  "PIE",
  "PL",
  "PTH",
  "RET",
  "RSE",
  "SIM",
  "TC",
  "TRY"
]
"apps/assistant/**" = ["ARG002", "PLR0913", "PLR2004", "PLW0603", "TC", "UP"]
"apps/gateway/**" = ["TC", "UP"]
"apps/mcp/**" = ["UP"]
"apps/slackbot/**" = ["ARG002", "PLR0913", "PLR2004", "PLW0603", "TC", "UP"]
"conftest.py" = ["PLC0415"]
"**/tests/**/*.py" = [
  "A",
  "ANN",
  "ARG",
  "B018",
  "ERA",
  "N802",
  "PL",
  "PLC0415",
  "PTH",
  "RET",
  "RSE",
  "RUF059",
  "S",
  "SIM",
  "TC",
  "TRY"
]

[tool.uv]
# dependency groups that are installed by `uv run`
# https://docs.astral.sh/uv/reference/settings/#default-groups
default-groups = ["dev"]
exclude-newer = "7 days"

[tool.uv.exclude-newer-package]
clickhouse-connect = false

[tool.uv.workspace]
members = ["apps/*", "libraries/*", "plugins/*"]

[tool.uv.sources]
imbi-common = { workspace = true }
imbi-api = { workspace = true }
imbi-assistant = { workspace = true }
imbi-gateway = { workspace = true }
imbi-mcp = { workspace = true }
imbi-slackbot = { workspace = true }
imbi-plugin-aws = { workspace = true }
imbi-plugin-github = { workspace = true }
imbi-plugin-google = { workspace = true }
imbi-plugin-logzio = { workspace = true }
imbi-plugin-oidc = { workspace = true }
imbi-plugin-pagerduty = { workspace = true }
imbi-plugin-sonarqube = { workspace = true }

[[tool.uv.index]]
url = "https://pypi.org/simple"
default = true
