[project]
name = "imbi"
version = "2.18.0"
description = "Imbi is a DevOps Service Management Platform designed to provide an efficient way to manage a large environment that contains many services and applications."
readme = "README.md"
requires-python = ">=3.14"
license = "BSD-3-Clause"
license-files = ["LICENSE"]
authors = [
  { name = "Gavin M. Roy", email = "gavinr@aweber.com" },
  { name = "Dave Shawley", email = "daves@aweber.com" },
  { name = "Alex Campbell", email = "alexc@aweber.com" }
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "Natural Language :: English",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.14",
]
# Meta-distribution: installing `imbi` installs the whole platform.
dependencies = [
  "imbi-api==2.18.0",
  "imbi-assistant==2.18.0",
  "imbi-common[databases,llm,mcp,otel,sentry,server]==2.18.0",
  "imbi-gateway==2.18.0",
  "imbi-mcp==2.18.0",
  "imbi-plugin-aws==2.18.0",
  "imbi-plugin-github==2.18.0",
  "imbi-plugin-google==2.18.0",
  "imbi-plugin-logzio==2.18.0",
  "imbi-plugin-oidc==2.18.0",
  "imbi-plugin-pagerduty==2.18.0",
  "imbi-plugin-sonarqube==2.18.0",
  "imbi-slackbot==2.18.0",
]

[dependency-groups]
dev = [
  "basedpyright>=1.37.1",
  "build",
  "click~=8.2.1",  # 8.3 CliRunner drops stderr from result.output; also breaks mkdocs serve
  "coverage[toml]>=7.13.1",
  "httpcore",
  "mypy~=1.19.1",
  "pre-commit>=4.5.1",
  "pytest~=9.0",
  "pytest-asyncio",
  "pytest-cov>=7.0.0",
  "python-dotenv>=1.1.0",
  "respx",
  "ruff~=0.14.6",
  "tomli-w~=1.2",
  "types-nanoid>=2.0.0.20260408",
  "watchfiles",
]
dist = ["build", "twine", "wheel"]
docs = [
  "griffe-pydantic",
  "mkdocstrings-python-xref>=1.6,<2",
  "mkdocstrings[python]",
  "zensical>=0.0.50,<0.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.coverage.html]
directory = "build/coverage"

[tool.coverage.report]
exclude_also = ["typing.TYPE_CHECKING"]
fail_under = 85
show_missing = true

[tool.coverage.run]
branch = true
source_pkgs = ["imbi"]

[tool.coverage.xml]
output = "build/coverage.xml"

[tool.hatch.build.targets.wheel]
# Meta-package: no code of its own.
bypass-selection = true

[tool.mypy]
strict = true
python_executable = ".venv/bin/python"
namespace_packages = true
explicit_package_bases = true
files = [
  "libraries/common/src",
  "apps/api/src",
  "apps/assistant/src",
  "apps/gateway/src",
  "apps/mcp/src",
  "apps/slackbot/src",
  "plugins/aws/src",
  "plugins/github/src",
  "plugins/google/src",
  "plugins/logzio/src",
  "plugins/oidc/src",
  "plugins/pagerduty/src",
  "plugins/sonarqube/src",
]
mypy_path = "typings:libraries/common/src:apps/api/src:apps/assistant/src:apps/gateway/src:apps/mcp/src:apps/slackbot/src:plugins/aws/src:plugins/github/src:plugins/google/src:plugins/logzio/src:plugins/oidc/src:plugins/pagerduty/src:plugins/sonarqube/src"

[[tool.mypy.overrides]]
module = ["clickhouse_connect.*", "jsonpointer", "nanoid", "pgvector.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
# carried over from imbi-api's mypy.ini
module = [
  "aioboto3.*",
  "botocore.*",
  "filetype.*",
  "jsonpatch",
  "qrcode.*",
]
ignore_missing_imports = true

[[tool.mypy.overrides]]
# imbi-api's mypy.ini ran with warn_unused_ignores = false — burn down
module = "imbi.api.*"
warn_unused_ignores = false

[tool.pyright]
deprecateTypingAliases = true
reportMissingSuperCall = "information"
reportMissingTypeStubs = false
reportDeprecated = "warning"
typeCheckingMode = "strict"
extraPaths = [
  "libraries/common/src",
  "apps/api/src",
  "apps/assistant/src",
  "apps/gateway/src",
  "apps/mcp/src",
  "apps/slackbot/src",
  "plugins/aws/src",
  "plugins/github/src",
  "plugins/google/src",
  "plugins/logzio/src",
  "plugins/oidc/src",
  "plugins/pagerduty/src",
  "plugins/sonarqube/src",
]
exclude = [
  "**/node_modules",
  "**/__pycache__",
  ".venv",
  "ui",
  "typings",
  "docs"
]

