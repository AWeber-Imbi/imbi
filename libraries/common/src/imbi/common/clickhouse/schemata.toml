# Base ClickHouse schemas for imbi-common
# These tables are used across multiple Imbi services

[session_activity]
query = """
CREATE TABLE IF NOT EXISTS session_activity (
    timestamp           DateTime64(3),
    service_name        LowCardinality(String),
    session_id          String,
    user_id             LowCardinality(String),
    ip_subnet           IPv6         COMMENT 'Truncated to /24 (IPv4) or /48 (IPv6)',
    request_url         String,
    method              LowCardinality(String),
    http_headers        JSON,
    response_status     UInt16
) ENGINE = MergeTree()
ORDER BY (timestamp, session_id)
PARTITION BY toYYYYMM(timestamp)
TTL timestamp + INTERVAL 30 DAY;

"""
enabled = false

[mfa_events]
query = """
CREATE TABLE IF NOT EXISTS mfa_events (
    timestamp   DateTime64(3),
    user_id     String,
    event_type  Enum('enabled' = 1, 'disabled' = 2, 'verified' = 3, 'failed' = 4, 'backup_used' = 5),
    ip_subnet   IPv6 COMMENT 'Truncated to /24 (IPv4) or /48 (IPv6)',
    success     Bool
) ENGINE = MergeTree()
ORDER BY (timestamp, user_id)
PARTITION BY toYYYYMM(timestamp)
TTL timestamp + INTERVAL 90 DAY;
"""
enabled = false

[operations_log]
query = """
CREATE TABLE IF NOT EXISTS operations_log (
    id                String,
    occurred_at       DateTime64(3, 'UTC'),
    recorded_at       DateTime64(3, 'UTC'),
    recorded_by       LowCardinality(String),
    performed_by      Nullable(String),
    completed_at      Nullable(DateTime64(3, 'UTC')),
    project_id        LowCardinality(String),
    project_slug      LowCardinality(String),
    environment_slug  LowCardinality(String),
    entry_type        LowCardinality(String),
    description       String,
    link              Nullable(String),
    notes             Nullable(String),
    ticket_slug       Nullable(String),
    version           Nullable(String),
    _row_version      UInt64 DEFAULT 1,
    is_deleted        UInt8  DEFAULT 0,
    INDEX idx_id id TYPE bloom_filter GRANULARITY 4
) ENGINE = ReplacingMergeTree(_row_version)
PARTITION BY toYYYYMM(occurred_at)
ORDER BY (project_id, id)
;
"""
enabled = true
