# Base ClickHouse schemas for imbi-common
# These tables are used across multiple Imbi services

[events]
query = """
CREATE TABLE IF NOT EXISTS imbi.events (
  id                   String           DEFAULT '',
  project_id           LowCardinality(String),
  recorded_at          DateTime64(3, 'UTC'),
  type                 LowCardinality(String) DEFAULT '',
  third_party_service  LowCardinality(String) DEFAULT '',
  attributed_to        LowCardinality(String) DEFAULT '',
  metadata             JSON,
  payload              JSON
) ENGINE = MergeTree()
PARTITION BY toYYYYMM(recorded_at)
ORDER BY (project_id, recorded_at);
"""
enabled = true

[operations_log]
query = """
CREATE TABLE IF NOT EXISTS imbi.operations_log (
    id                String,
    occurred_at       DateTime64(3, 'UTC'),
    recorded_at       DateTime64(3, 'UTC'),
    recorded_by       LowCardinality(String),
    performed_by      Nullable(String),
    completed_at      Nullable(DateTime64(3, 'UTC')),
    project_id        LowCardinality(String),
    project_slug      LowCardinality(String),
    environment_slug  LowCardinality(String),
    entry_type        LowCardinality(String),
    description       String,
    link              Nullable(String),
    notes             Nullable(String),
    ticket_slug       Nullable(String),
    version           Nullable(String),
    _row_version      UInt64 DEFAULT 1,
    is_deleted        UInt8  DEFAULT 0,
    plugin_slug       LowCardinality(String) DEFAULT '',
    external_run_id   Nullable(String),
    INDEX idx_id id TYPE bloom_filter GRANULARITY 4,
    INDEX idx_ext_run external_run_id TYPE bloom_filter GRANULARITY 4
) ENGINE = ReplacingMergeTree(_row_version)
PARTITION BY toYYYYMM(occurred_at)
ORDER BY (project_id, id);
"""
enabled = true

[pull_requests]
query = """
CREATE TABLE IF NOT EXISTS imbi.pull_requests (
    project_id      LowCardinality(String),
    pr_id           String,
    pr_number       UInt32,
    title           String,
    url             String,
    state           LowCardinality(String),
    author          String,
    draft           Bool,
    merged          Bool,
    created_at      DateTime64(3, 'UTC'),
    updated_at      DateTime64(3, 'UTC'),
    merged_at       Nullable(DateTime64(3, 'UTC')),
    additions       UInt32,
    deletions       UInt32,
    changed_files   UInt32,
    recorded_at     DateTime64(3, 'UTC')
) ENGINE = ReplacingMergeTree(recorded_at)
PARTITION BY toYYYYMM(created_at)
ORDER BY (project_id, pr_id);
"""
enabled = true

[pull_request_mv]
query = """
CREATE MATERIALIZED VIEW IF NOT EXISTS imbi.pull_requests_mv
TO imbi.pull_requests AS
SELECT
    project_id,
    CAST(payload.pull_request.id, 'String')                         AS pr_id,
    CAST(payload.pull_request.number, 'UInt32')                     AS pr_number,
    CAST(payload.pull_request.title, 'String')                      AS title,
    CAST(payload.pull_request.html_url, 'String')                   AS url,
    CAST(payload.pull_request.state, 'String')                      AS state,
    CAST(payload.pull_request.user.login, 'String')                 AS author,
    CAST(payload.pull_request.draft, 'Bool')                        AS draft,
    CAST(payload.pull_request.merged, 'Bool')                       AS merged,
    parseDateTime64BestEffort(
        CAST(payload.pull_request.created_at, 'String'))            AS created_at,
    parseDateTime64BestEffort(
        CAST(payload.pull_request.updated_at, 'String'))            AS updated_at,
    if(isNotNull(payload.pull_request.merged_at),
        parseDateTime64BestEffort(
            CAST(payload.pull_request.merged_at, 'String')),
        NULL)                                                        AS merged_at,
    CAST(payload.pull_request.additions, 'UInt32')                  AS additions,
    CAST(payload.pull_request.deletions, 'UInt32')                  AS deletions,
    CAST(payload.pull_request.changed_files, 'UInt32')              AS changed_files,
    recorded_at
FROM imbi.events
WHERE type = 'pull_request'
  AND third_party_service = 'github-enterprise-cloud'
  AND CAST(payload.action, 'String') IN ('opened', 'closed', 'reopened');
"""
enabled = true

[score_history]
query = """
CREATE TABLE IF NOT EXISTS imbi.score_history (
  project_id     LowCardinality(String),
  timestamp      DateTime64(3, 'UTC'),
  score          Float32,
  previous_score Float32,
  change_reason  LowCardinality(String),
  breakdown      JSON
) ENGINE = MergeTree()
PARTITION BY toYear(timestamp)
ORDER BY (project_id, timestamp);
"""
enabled = true

[score_latest_data]
query = """
CREATE MATERIALIZED VIEW IF NOT EXISTS imbi.score_latest_data
ENGINE = AggregatingMergeTree()
ORDER BY project_id
AS SELECT
    project_id,
    argMaxState(score, timestamp)     AS latest_score,
    avgState(score)                   AS avg_score,
    maxState(timestamp)               AS last_updated
FROM imbi.score_history
GROUP BY project_id;
"""
enabled = true

[score_latest]
query = """
CREATE VIEW IF NOT EXISTS imbi.score_latest AS
SELECT
    project_id,
    argMaxMerge(latest_score) AS latest_score,
    avgMerge(avg_score)       AS avg_score,
    maxMerge(last_updated)    AS last_updated
FROM imbi.score_latest_data
GROUP BY project_id;
"""
enabled = true

[commits]
query = """
CREATE TABLE IF NOT EXISTS imbi.commits (
  project_id    LowCardinality(String),
  sha           String,
  short_sha     String DEFAULT substring(sha, 1, 7),
  ref           LowCardinality(String),
  message       String,
  author_name   String DEFAULT '',
  author_email  String DEFAULT '',
  author_login  LowCardinality(String) DEFAULT '',
  author_user   LowCardinality(String) DEFAULT '',
  committer_name  String DEFAULT '',
  authored_at   DateTime64(3, 'UTC'),
  committed_at  Nullable(DateTime64(3, 'UTC')),
  url           String DEFAULT '',
  pushed_at     DateTime64(3, 'UTC'),
  recorded_at   DateTime64(3, 'UTC')
) ENGINE = ReplacingMergeTree(recorded_at)
PARTITION BY toYear(authored_at)
ORDER BY (project_id, sha);
"""
enabled = true

[tags]
query = """
CREATE TABLE IF NOT EXISTS imbi.tags (
  project_id    LowCardinality(String),
  name          String,
  sha           String,
  message       String DEFAULT '',
  tagger_name   String DEFAULT '',
  tagger_email  String DEFAULT '',
  tagged_at     Nullable(DateTime64(3, 'UTC')),
  url           String DEFAULT '',
  recorded_at   DateTime64(3, 'UTC')
) ENGINE = ReplacingMergeTree(recorded_at)
PARTITION BY toYear(recorded_at)
ORDER BY (project_id, name);
"""
enabled = true
