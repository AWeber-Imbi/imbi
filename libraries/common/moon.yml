# yaml-language-server: $schema=https://moonrepo.dev/schemas/project.json
layer: 'library'
stack: 'backend'
language: 'python'
tags:
  - 'python'

project:
  name: 'imbi-common'
  description: 'Shared library: data access, auth primitives, and domain models'

# Inherits lint / format / typecheck / test from .moon/tasks/python.yml. Only
# the coverage module for this member is member-specific.
tasks:
  test:
    args:
      - '--cov=imbi.common'
      - '--cov-report=term-missing'
