name: Publish to PyPI
on:
  release:
    types: [published]

permissions:
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: 3.14
          enable-cache: true

      - name: Build
        run: uv build

      - name: Upload dist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Download dist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish package
        # Intentionally pinned to the release/v1 branch rather than a SHA.
        # PyPA ship trusted-publishing fixes by rolling this branch forward,
        # and recommend tracking it instead of pinning a commit.
        # https://github.com/pypa/gh-action-pypi-publish#:~:text=release/v1
        uses: pypa/gh-action-pypi-publish@release/v1
