site_name: Imbi Common Library
site_description: Shared library for the Imbi ecosystem
site_author: Imbi Team
site_url: https://aweber-imbi.github.io/imbi-common/

repo_name: aweber/imbi-common
repo_url: https://github.com/aweber/imbi-common
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - Quick Start: quickstart.md
      - Configuration: configuration.md
  - API Reference:
      - Settings: api/settings.md
      - Imbi API Client: api/api-client.md
      - Graph (Apache AGE): api/graph.md
      - ClickHouse Client: api/clickhouse.md
      - Valkey Client: api/valkey.md
      - Models: api/models.md
      - Blueprints: api/blueprints.md
      - JSON Pointer: api/json-pointer.md
      - Authentication: api/auth.md
      - MCP Toolset Policy: api/mcp.md
      - Logging: api/logging.md
      - OpenTelemetry: api/otel.md
      - Lifespan: api/lifespan.md
  - Guides:
      - Database Setup: guides/database-setup.md
      - Deployment: guides/deployment.md
      - Authentication: guides/authentication.md
      - Lifespan and Dependency Injection: guides/lifespan-di.md
      - Testing: guides/testing.md
  - Plugins:
      - Authoring Plugins: plugins/index.md
      - Configuration: plugins/configuration.md
      - Logs: plugins/logs.md
      - Identity: plugins/identity.md
      - Deployment: plugins/deployment.md
      - Lifecycle: plugins/lifecycle.md
      - Webhook Actions: plugins/webhook-actions.md
      - Analysis: plugins/analysis.md
      - Incidents: plugins/incidents.md
      - Commit Sync: plugins/commit-sync.md
      - Pull Request Sync: plugins/pr-sync.md
      - Tools: plugins/tools.md
  - Architecture:
      - ADR 0001: adr/0001-imbi-common-library-extraction.md
      - ADR 0002: adr/0002-lifespan-composition.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            docstring_style: google
            merge_init_into_class: true
            separate_signature: true
            show_signature_annotations: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
