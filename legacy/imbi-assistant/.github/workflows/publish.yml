name: Publish to PyPI
on:
  release:
    types: [published]

permissions:
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.14

      - name: Verify release tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(uv version --short)"
          if [ "$tag" != "$version" ]; then
            echo "::error::Release tag '${GITHUB_REF_NAME}' does not match" \
                 "pyproject.toml version '${version}'. Bump the version in" \
                 "pyproject.toml (and re-lock) before tagging the release."
            exit 1
          fi
          echo "Release tag '${GITHUB_REF_NAME}' matches package version '${version}'."

      - name: Build
        run: uv build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
