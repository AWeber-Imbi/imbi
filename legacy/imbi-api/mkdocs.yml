site_name: Imbi Documentation
site_description: DevOps Service Management Platform
site_author: AWeber Communications
site_url: https://imbi.readthedocs.io

repo_name: AWeber-Imbi/imbi-api
repo_url: https://github.com/AWeber-Imbi/imbi-api
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Configuration: configuration.md
  - Restore Backup: restore-backup.md
  - Architecture Decision Records:
      - Overview: adr.md
      - 0001 Record Architecture Decisions: adr/0001-record-architecture-decisions.md
      - 0002 Authentication and Authorization: adr/0002-authentication-and-authorization-architecture.md
      - 0003 Email Sending: adr/0003-email-sending-architecture.md
      - 0004 Phase 5 Authentication Enhancements: adr/0004-phase-5-authentication-enhancements.md
      - 0005 File Upload Storage: adr/0005-file-upload-storage-architecture.md
      - 0006 Project Identity and Multi-Type: adr/0006-project-identity-and-multi-type.md
      - 0007 Relationship Blueprints: adr/0007-relationship-blueprints.md
      - 0008 Plugin System Architecture: adr/0008-plugin-system-architecture.md
      - 0009 Database-Driven OAuth Providers: adr/0009-database-driven-oauth-providers.md
      - 0010 Identity Plugin Architecture: adr/0010-identity-plugin-architecture.md
      - 0011 Graph-Based Project Scoring: adr/0011-graph-based-project-scoring.md
      - 0012 Plugin Manifest Service Template: adr/0012-plugin-manifest-service-template.md
      - 0013 Deployment Plugin Type: adr/0013-deployment-plugin-type.md
      - 0014 Generic Plugin-Entity CRUD: adr/0014-generic-plugin-entity-abstraction.md

extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/aweber/imbi-api
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/imbi/
