name: "Run Tests"
on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '*.md'
    tags-ignore: [ "*" ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: "Static Analysis"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just@1.50.0
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run lint checks
        env:
          UV_FROZEN: "1"
        run: just lint

  test:
    name: "Automated Tests"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: [ "3.14" ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just@1.50.0
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ matrix.python }}
      - name: Run tests
        env:
          UV_FROZEN: "1"
        run: just test
      - name: Upload coverage reports
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: "build/coverage.xml"
          flags: unittests
