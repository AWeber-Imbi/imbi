# yaml-language-server: $schema=https://moonrepo.dev/schemas/tasks.json
#
# Inherited by every project carrying the `python` tag (all uv workspace
# members). Tasks run through `uv run` so they use the shared .venv and the
# frozen lockfile, mirroring the repo's established idiom. The `test` task
# below reads each member's own [tool.coverage] via --cov-config; each member's
# moon.yml enables it with a bare `--cov`.

inheritedBy:
  tags:
    or:
      - 'python'

tasks:
  lint:
    command: 'uv'
    args:
      - 'run'
      - '--frozen'
      - 'ruff'
      - 'check'
      - '$projectSource'
    deps:
      - 'root:setup-env'
    options:
      runFromWorkspaceRoot: true
    inputs:
      - 'src/**/*'
      - 'tests/**/*'

  format:
    command: 'uv'
    args:
      - 'run'
      - '--frozen'
      - 'ruff'
      - 'format'
      - '--check'
      - '$projectSource'
    deps:
      - 'root:setup-env'
    options:
      runFromWorkspaceRoot: true
    inputs:
      - 'src/**/*'
      - 'tests/**/*'

  typecheck:
    command: 'uv'
    args:
      - 'run'
      - '--frozen'
      - 'basedpyright'
      - '$projectSource/src'
    deps:
      - 'root:setup-env'
    options:
      runFromWorkspaceRoot: true
    inputs:
      - 'src/**/*'

  # Per-member suite against live backing services, for targeted local runs
  # (`moon run api:test`). `root:services` boots the docker compose stack and
  # writes /.env.test once; uv loads it via --env-file. Not hermetic (hits
  # Postgres/ClickHouse/etc.), so caching is keyed on the member's own sources
  # + tests only.
  #
  # `runInCI: false` because the whole suite shares one database with no
  # per-process isolation — running every member's suite concurrently under
  # `moon ci` would clobber shared state. CI instead runs the single-session
  # `root:coverage`. Flip this to `true` if/when the fixtures isolate per
  # process.
  test:
    command: 'uv'
    args:
      - 'run'
      - '--frozen'
      - '--env-file'
      - '.env.test'
      - 'pytest'
      - '$projectSource/tests'
      # Read coverage config from the member's own pyproject (not the root's,
      # which coverage would otherwise pick up from the workspace-root cwd and
      # whose source_pkgs=["imbi"] + fail_under would measure the whole
      # monorepo). Each member's [tool.coverage] scopes source + threshold to
      # itself; the member moon.yml appends its `--cov=imbi.<member>`.
      - '--cov-config=$projectSource/pyproject.toml'
    deps:
      - 'root:setup-env'
      - 'root:services'
    options:
      runFromWorkspaceRoot: true
      outputStyle: 'stream'
      runInCI: false
      # The whole suite shares one database with no per-process isolation, so
      # member suites must not run concurrently against it (see runInCI note).
      mutex: 'imbi-test-db'
    inputs:
      - 'src/**/*'
      - 'tests/**/*'
      # root:services rewrites this file with resolved ports/secrets; it feeds
      # the run via --env-file, so a change must bust the cached result.
      - '/.env.test'
