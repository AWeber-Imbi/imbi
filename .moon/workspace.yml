# yaml-language-server: $schema=https://moonrepo.dev/schemas/workspace.json

projects:
  # uv workspace members are discovered by glob; their ids come from the
  # folder name (api, common, github, ...).
  globs:
    - 'apps/*'
    - 'libraries/*'
    - 'plugins/*'
  # Named projects for the pieces that live outside the member globs. Docs are
  # not a separate project: mkdocs.yml + the docs/ content dir live at the repo
  # root and are built by the root project's `docs-build`/`docs-serve` tasks.
  sources:
    root: '.'
    ui: 'ui'

vcs:
  defaultBranch: main
  provider: github
