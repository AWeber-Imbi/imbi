name: "Pipeline"
on:
  push:
    branches:
      - "main"
  pull_request:
jobs:
  ci:
    name: "CI"
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"
        with:
          fetch-depth: 0
          filter: "blob:none"
          # moon ci only builds/tests (no push), so the token is not needed
          # after checkout; don't persist it in .git/config for later steps.
          persist-credentials: false
      # moon's unstable_uv toolchain installs uv, but with python left
      # unmanaged the `uv venv` env-setup step races ahead of that install
      # and fails with "uv: command not found" on fresh runners. Provision
      # uv on PATH first so it is available before `moon ci` runs any task.
      - uses: "astral-sh/setup-uv@v5"
        with:
          version: "0.11.13"
      - uses: "moonrepo/setup-toolchain@v0"
      - run: "moon ci"
  image:
    # Exercises the same docker/build-push-action configuration as
    # release.yml (single arch, no push) so drift in the build context,
    # Dockerfile path, or build args fails here instead of on a release tag.
    name: "Image"
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v4"
        with:
          persist-credentials: false
      - uses: "docker/setup-buildx-action@v3"
      - uses: "docker/build-push-action@v6"
        with:
          context: .
          file: ./container/Dockerfile
          platforms: linux/amd64
          push: false
          build-args: |
            VITE_GIT_REF=${{ github.sha }}
          cache-from: type=gha,scope=linux-amd64
          cache-to: type=gha,mode=max,scope=linux-amd64
