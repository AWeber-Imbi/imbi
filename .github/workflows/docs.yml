name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'libraries/**'
      - 'apps/**'
      - 'plugins/**'
      - 'pyproject.toml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: "blob:none"
      # Provision uv on PATH before moon runs any task; moon's unstable_uv
      # toolchain otherwise races the env-setup step on fresh runners.
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.13"
      - name: Install moon toolchain
        uses: moonrepo/setup-toolchain@v0
      - name: Build documentation
        run: moon run root:docs-build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
