image:
  repository: ghcr.io/aweber-imbi/imbi
  tag: latest
  pullPolicy: IfNotPresent

# Number of replicas (used when service.mode is "all")
replicaCount: 1

# Service mode:
# - "all": run all services in one pod (uses replicaCount above)
# - "api" | "assistant" | "gateway" | "mcp": run a single service
# Use the matching .service.<name>.replicas value to scale that service.
service:
  mode: all
  # Internal upstream URL imbi-mcp and imbi-assistant use to reach
  # imbi-api. The default works for "all" and "api" modes; override
  # when running "mcp" or "assistant" as separate pods (e.g.
  # http://imbi-api.<namespace>.svc.cluster.local:8000).
  internalApiUrl: "http://localhost:8000"
  api:
    replicas: 1
  assistant:
    replicas: 1
  gateway:
    replicas: 1
  mcp:
    replicas: 1

# Required authentication settings
auth:
  jwtSecret: ""
  encryptionKey: ""

# Optional: reference an existing secret instead of specifying values above.
# The secret must contain keys: jwt-secret, encryption-key
existingSecret: ""

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: imbi.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

# ClickHouse connection (external, required).
#
# The chart does not bundle ClickHouse; provision it externally (the Altinity
# ClickHouse operator is the recommended approach) and set the connection URL.
# See docs/deployment/kubernetes.md.
externalClickhouse:
  url: ""  # REQUIRED, e.g. clickhouse+http://default:password@clickhouse-imbi:8123/imbi

# PostgreSQL connection (external, required).
#
# Imbi's graph database is PostgreSQL with the Apache AGE extension. The chart
# does not bundle a database; point this at an AGE-enabled PostgreSQL such as a
# CloudNativePG cluster. See docs/deployment/kubernetes.md for operator setup
# and an example Cluster manifest.
externalPostgresql:
  url: ""  # REQUIRED, e.g. postgresql://imbi:password@imbi-pg-rw:5432/imbi

# AI Assistant configuration
assistant:
  enabled: false
  anthropicApiKey: ""

# Email configuration
email:
  enabled: false
  smtp:
    host: ""
    port: 587
    useTls: true
  from:
    email: ""
    name: "Imbi"

# S3-compatible storage
storage:
  endpointUrl: ""
  accessKey: ""
  secretKey: ""
  bucket: imbi-uploads
  region: us-east-1
