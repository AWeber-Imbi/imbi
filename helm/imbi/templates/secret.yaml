{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "imbi.fullname" . }}
  labels:
    {{- include "imbi.labels" . | nindent 4 }}
type: Opaque
stringData:
  jwt-secret: {{ required "auth.jwtSecret is required" .Values.auth.jwtSecret | quote }}
  encryption-key: {{ required "auth.encryptionKey is required" .Values.auth.encryptionKey | quote }}
  neo4j-url: {{ include "imbi.neo4jUrl" . | quote }}
  clickhouse-url: {{ include "imbi.clickhouseUrl" . | quote }}
  postgres-url: {{ include "imbi.postgresUrl" . | quote }}
  {{- if .Values.assistant.anthropicApiKey }}
  anthropic-api-key: {{ .Values.assistant.anthropicApiKey | quote }}
  {{- end }}
  {{- if .Values.storage.accessKey }}
  s3-access-key: {{ .Values.storage.accessKey | quote }}
  s3-secret-key: {{ .Values.storage.secretKey | quote }}
  {{- end }}
{{- end }}
