apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "imbi.fullname" . }}
  labels:
    {{- include "imbi.labels" . | nindent 4 }}
spec:
  {{- if eq .Values.service.mode "all" }}
  replicas: {{ .Values.replicaCount }}
  {{- else }}
  replicas: {{ (index .Values.service .Values.service.mode).replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "imbi.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "imbi.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ include "imbi.containerPort" . | trim }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "imbi.fullname" . }}
          env:
            - name: IMBI_SERVICE
              value: {{ .Values.service.mode | quote }}
            - name: IMBI_AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "imbi.secretName" . }}
                  key: jwt-secret
            - name: IMBI_AUTH_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "imbi.secretName" . }}
                  key: encryption-key
            - name: CLICKHOUSE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "imbi.secretName" . }}
                  key: clickhouse-url
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "imbi.secretName" . }}
                  key: postgres-url
            {{- if and .Values.assistant.enabled .Values.assistant.anthropicApiKey }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "imbi.secretName" . }}
                  key: anthropic-api-key
            {{- end }}
            {{- if and .Values.storage.accessKey .Values.storage.secretKey }}
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "imbi.secretName" . }}
                  key: s3-access-key
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "imbi.secretName" . }}
                  key: s3-secret-key
            {{- end }}
          {{- if eq .Values.service.mode "all" }}
          livenessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- else if eq .Values.service.mode "api" }}
          livenessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- else }}
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
