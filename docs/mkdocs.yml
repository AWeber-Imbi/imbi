site_name: Imbi Documentation
site_description: DevOps Service Management Platform
site_url: https://aweber-imbi.github.io/imbi/

repo_name: AWeber-Imbi/imbi
repo_url: https://github.com/AWeber-Imbi/imbi

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - search.highlight

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Configuration: getting-started/configuration.md
      - Initial Setup: getting-started/setup.md
  - Administration:
      - Authentication: admin/authentication.md
      - Users and Groups: admin/users-and-groups.md
      - Roles and Permissions: admin/roles-and-permissions.md
      - Blueprints: admin/blueprints.md
  - Deployment:
      - Docker: deployment/docker.md
      - Kubernetes: deployment/kubernetes.md
  - Architecture:
      - Overview: architecture/overview.md
      - Services: architecture/services.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - toc:
      permalink: true
